name: sevacare_flutter
description: SevaCare — Multi-tenant healthcare platform for patients, doctors, and hospital administrators.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP
  dio: ^5.7.0

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Fonts
  google_fonts: ^6.2.1

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # General key-value persistence
  shared_preferences: ^2.3.3

  # Date formatting
  intl: ^0.19.0

  # QR code rendering
  qr_flutter: ^4.1.0

  # Image picking for profile photo
  image_picker: ^1.1.2

  # Shimmer skeleton loading
  shimmer: ^3.0.0

  # PDF generation and download
  pdf: ^3.10.8
  printing: ^5.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
