name: sevacare_flutter
description: SevaCare — Multi-tenant healthcare platform for patients, doctors, and hospital administrators.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP
  dio: ^5.7.0

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Fonts
  google_fonts: ^6.2.1

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # General key-value persistence
  shared_preferences: ^2.3.3

  # Date formatting
  intl: ^0.19.0

  # QR code rendering
  qr_flutter: ^4.1.0

  # Image picking for profile photo
  image_picker: ^1.1.2

  # Shimmer skeleton loading
  shimmer: ^3.0.0

  # Biometric authentication (Face ID / fingerprint / PIN fallback)
  local_auth: ^2.3.0

  # Network connectivity monitoring
  connectivity_plus: ^6.1.1

  # PDF generation and download
  pdf: ^3.10.8
  printing: ^5.13.2

  # Opening a wa.me link to share a receipt
  url_launcher: ^6.3.1

  # The real WhatsApp brand glyph (Material has no brand icons)
  font_awesome_flutter: ^10.7.0

  # Charts for insights/reports
  fl_chart: ^0.69.2

  # Location detection for "Nearby Hospitals"
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Picking a supplier's price list off the device (catalog import)
  file_picker: ^8.1.7

  # Reading .xlsx directly, so a store need not "Save as CSV" first
  excel: ^4.0.6
  sentry_flutter: ^8.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/doctor_photos/
    - assets/images/staff_photos/
