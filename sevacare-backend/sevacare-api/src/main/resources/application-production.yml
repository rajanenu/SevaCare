# Production overrides – activated when SPRING_PROFILES_ACTIVE=production.
# Every value here is injected from the environment (Secret Manager / Cloud Run);
# there are intentionally NO fallback defaults so a missing secret fails fast at boot.
spring:
  datasource:
    # On Cloud Run this is the Cloud SQL socket-factory URL (jdbc:postgresql:///db?cloudSqlInstance=...&socketFactory=...)
    url: ${SEVACARE_DB_URL}
    username: ${SEVACARE_DB_USERNAME}
    password: ${SEVACARE_DB_PASSWORD}
    hikari:
      # db-g1-small has a small connection ceiling; keep each instance's pool tight.
      maximum-pool-size: ${SEVACARE_DB_POOL_MAX:5}
      minimum-idle: 1
      connection-timeout: 10000
  jpa:
    properties:
      hibernate:
        format_sql: false
        show_sql: false

sevacare:
  auth:
    secret: ${SEVACARE_AUTH_SECRET}
  cors:
    # Required in production — comma-separated exact web origins (the frontend URL).
    allowed-origins: ${SEVACARE_CORS_ORIGINS}

server:
  # Cloud Run terminates TLS at its proxy and forwards plain HTTP with
  # X-Forwarded-Proto. Without this, Spring sees the request as http:// and
  # misclassifies same-origin https form POSTs (QR booking page) as CORS
  # violations, rejecting them with 403.
  forward-headers-strategy: framework

logging:
  level:
    root: WARN
    com.sevacare: INFO
  # One JSON object per line (Elastic Common Schema), so Cloud Logging parses it
  # into jsonPayload — with a `message` field — instead of filing every line as an
  # unranked text blob. This is what makes the log-based metrics/alerts (e.g. on
  # cross_tenant_denied, filtered on jsonPayload.message) possible — the free-tier
  # observability path, no Prometheus scraper to pay for. NOTE: `gcp` is NOT a valid
  # Spring Boot format (only ecs/gelf/logstash are built in) — setting it crashes
  # startup with "Unknown format 'gcp'". ecs is the portable, structured choice.
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
