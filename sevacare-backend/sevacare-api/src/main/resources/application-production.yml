# Production overrides – activated when SPRING_PROFILES_ACTIVE=production
spring:
  datasource:
    url: ${SEVACARE_DB_URL}
    username: ${SEVACARE_DB_USERNAME}
    password: ${SEVACARE_DB_PASSWORD}
  jpa:
    properties:
      hibernate:
        format_sql: false
        show_sql: false

sevacare:
  auth:
    secret: ${SEVACARE_AUTH_SECRET}
  storage:
    onboarding-dir: ${SEVACARE_ONBOARDING_STORAGE_DIR:/tmp/sevacare-storage/onboarding}

logging:
  level:
    root: WARN
    com.sevacare: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
