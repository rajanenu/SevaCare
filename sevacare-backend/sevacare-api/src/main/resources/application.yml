spring:
  application:
    name: sevacare-api
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${SEVACARE_DB_URL:jdbc:postgresql://localhost:5432/seva_care}
    username: ${SEVACARE_DB_USERNAME:postgres}
    password: ${SEVACARE_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

sevacare:
  auth:
    secret: ${SEVACARE_AUTH_SECRET:dev-sevacare-secret}
  storage:
    onboarding-dir: ${SEVACARE_ONBOARDING_STORAGE_DIR:${user.home}/sevacare-storage/onboarding}
  cors:
    allowed-origins: ${SEVACARE_CORS_ORIGINS:http://localhost:8087,http://192.168.*.*:8087,http://10.*.*.*:8087}

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/plain
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
