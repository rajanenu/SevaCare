# Base config with LOCAL-friendly defaults (localhost DB, dev secret, LAN CORS).
# Production overrides live in application-production.yml and are activated with
# SPRING_PROFILES_ACTIVE=production — where every secret MUST come from the env.
spring:
  application:
    name: sevacare-api
  # Bound the graceful-shutdown wait so a wedged request cannot delay the SIGTERM
  # → SIGKILL window forever; drains as soon as in-flight requests complete.
  lifecycle:
    timeout-per-shutdown-phase: 20s
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${SEVACARE_DB_URL:jdbc:postgresql://localhost:5432/seva_care}
    username: ${SEVACARE_DB_USERNAME:postgres}
    password: ${SEVACARE_DB_PASSWORD:postgres}
    hikari:
      # Keep DB-side now()/CURRENT_TIMESTAMP defaults in IST too, matching the
      # JVM default set in SevaCareApiApplication (Cloud SQL defaults to UTC).
      # Also cap runaway work at the session level so one pathological query or a
      # stuck lock cannot pin a pooled connection and starve every other request:
      #   statement_timeout            — a query that overruns is cancelled, not left running
      #   lock_timeout                 — wait at most this long for a row/table lock, then fail fast
      #   idle_in_transaction_session_timeout — a transaction that stops making progress
      #                                  (client hang mid-tx) releases its connection + locks
      # Values are generous for OLTP and env-overridable, so a deliberately long
      # migration/backfill can raise them for one deploy without a code change.
      connection-init-sql: SET TIME ZONE 'Asia/Kolkata'; SET statement_timeout = '${SEVACARE_DB_STATEMENT_TIMEOUT:45s}'; SET lock_timeout = '${SEVACARE_DB_LOCK_TIMEOUT:15s}'; SET idle_in_transaction_session_timeout = '${SEVACARE_DB_IDLE_TX_TIMEOUT:30s}'
      # A borrowed connection that outlives a request is a leak, not a slow query.
      max-lifetime: 900000
      idle-timeout: 300000
      leak-detection-threshold: 20000
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        # Batch the per-medicine inserts a consult issues, and let read-heavy
        # queue screens pull rows in blocks instead of one round-trip each.
        jdbc:
          batch_size: 30
          fetch_size: 100
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

sevacare:
  auth:
    secret: ${SEVACARE_AUTH_SECRET:dev-sevacare-secret}
  jobs:
    # Shared secret for POST /internal/jobs/run (Cloud Scheduler → background jobs
    # with full CPU; see InternalJobsController). Empty = endpoint answers 404.
    # Local dev needs none: the @Scheduled timers run normally off Cloud Run.
    token: ${SEVACARE_JOBS_TOKEN:}
  cors:
    allowed-origins: ${SEVACARE_CORS_ORIGINS:http://localhost:8087,http://192.168.*.*:8087,http://10.*.*.*:8087}
  whatsapp:
    # Messages are always queued into public.whatsapp_outbox. They are only
    # delivered once phone-number-id + access-token are set (Meta WhatsApp Cloud
    # API); until then rows are parked as NO_PROVIDER with a wa.me link intact.
    enabled: ${SEVACARE_WHATSAPP_ENABLED:true}
    api-base: ${SEVACARE_WHATSAPP_API_BASE:https://graph.facebook.com/v20.0}
    phone-number-id: ${SEVACARE_WHATSAPP_PHONE_NUMBER_ID:}
    access-token: ${SEVACARE_WHATSAPP_ACCESS_TOKEN:}
    country-code: ${SEVACARE_WHATSAPP_COUNTRY_CODE:91}
    drain-interval-ms: ${SEVACARE_WHATSAPP_DRAIN_INTERVAL_MS:60000}

server:
  port: ${PORT:8080}
  # On a Cloud Run scale-in or new-revision rollout the instance gets SIGTERM.
  # Graceful shutdown lets in-flight requests (a booking, a sale) finish instead
  # of being severed mid-transaction; new connections are refused immediately.
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,text/plain
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # "never" is the default everywhere: the detailed view names the DB vendor
      # and disk paths, which is reconnaissance for anyone who finds an instance.
      # Opt in per-run when debugging: --management.endpoint.health.show-details=always
      show-details: never
