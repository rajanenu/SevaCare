# GCP Cloud Build — builds and deploys backend + frontend to Cloud Run
#
# Required substitutions (set in Cloud Build trigger or pass via --substitutions):
#   _GCP_REGION            e.g. asia-south1
#   _GCP_PROJECT           your GCP project ID
#   _BACKEND_SERVICE       cloud run service name for backend  e.g. sevacare-backend
#   _FRONTEND_SERVICE      cloud run service name for frontend e.g. sevacare-frontend
#   _BACKEND_IMAGE         artifact registry image path, e.g. asia-south1-docker.pkg.dev/$PROJECT_ID/sevacare/backend
#   _FRONTEND_IMAGE        artifact registry image path, e.g. asia-south1-docker.pkg.dev/$PROJECT_ID/sevacare/frontend
#   _BACKEND_URL           public URL of the backend Cloud Run service (used as frontend API base)
#
# Required Secret Manager secrets (referenced as env vars in Cloud Run):
#   SEVACARE_DB_URL         jdbc:postgresql://...
#   SEVACARE_DB_USERNAME
#   SEVACARE_DB_PASSWORD
#   SEVACARE_AUTH_SECRET

substitutions:
  _GCP_REGION: asia-south1
  _GCP_PROJECT: ${PROJECT_ID}
  _BACKEND_SERVICE: sevacare-backend
  _FRONTEND_SERVICE: sevacare-frontend
  _BACKEND_IMAGE: ${_GCP_REGION}-docker.pkg.dev/${_GCP_PROJECT}/sevacare/backend
  _FRONTEND_IMAGE: ${_GCP_REGION}-docker.pkg.dev/${_GCP_PROJECT}/sevacare/frontend
  _BACKEND_URL: https://sevacare-backend-2glz4tgi3q-el.a.run.app
  # Comma-separated web origins allowed by the backend CORS filter. Cloud Run
  # serves every service under BOTH the hash-style and project-number-style
  # URLs, so both frontend forms must be listed. The backend's own URLs are
  # also listed because the QR booking page is served from the backend origin
  # and browsers attach an Origin header to its form POSTs.
  _CORS_ORIGINS: https://sevacare-frontend-2glz4tgi3q-el.a.run.app,https://sevacare-frontend-209136271820.asia-south1.run.app,https://sevacare-backend-2glz4tgi3q-el.a.run.app,https://sevacare-backend-209136271820.asia-south1.run.app

steps:
  # ── 1. Build backend image ─────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-backend
    dir: sevacare-backend
    args:
      - build
      - -f
      - ../sevacare-deploy/Dockerfile.backend
      - -t
      - ${_BACKEND_IMAGE}:${SHORT_SHA}
      - -t
      - ${_BACKEND_IMAGE}:latest
      - .

  # ── 2. Build frontend image (Flutter web, bake in backend URL) ─────────────
  # Context is the repo root because Dockerfile.frontend copies from sevacare-flutter/.
  - name: 'gcr.io/cloud-builders/docker'
    id: build-frontend
    args:
      - build
      - -f
      - sevacare-deploy/Dockerfile.frontend
      - --build-arg
      - ENV=production
      - --build-arg
      - API_BASE_URL=${_BACKEND_URL}/api/v1
      - -t
      - ${_FRONTEND_IMAGE}:${SHORT_SHA}
      - -t
      - ${_FRONTEND_IMAGE}:latest
      - .

  # ── 3. Push images ─────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-backend
    waitFor: [build-backend]
    args: [push, '--all-tags', '${_BACKEND_IMAGE}']

  - name: 'gcr.io/cloud-builders/docker'
    id: push-frontend
    waitFor: [build-frontend]
    args: [push, '--all-tags', '${_FRONTEND_IMAGE}']

  # ── 4. Deploy backend to Cloud Run ────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-backend
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=${_BACKEND_IMAGE}:${SHORT_SHA}
      - --region=${_GCP_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=1
      - --max-instances=5
      # ^@^ switches the env-var delimiter to @ so the comma-separated CORS list survives.
      - --set-env-vars=^@^SPRING_PROFILES_ACTIVE=production@SEVACARE_CORS_ORIGINS=${_CORS_ORIGINS}
      - --set-secrets=SEVACARE_DB_URL=SEVACARE_DB_URL:latest,SEVACARE_DB_USERNAME=SEVACARE_DB_USERNAME:latest,SEVACARE_DB_PASSWORD=SEVACARE_DB_PASSWORD:latest,SEVACARE_AUTH_SECRET=SEVACARE_AUTH_SECRET:latest

  # ── 5. Deploy frontend to Cloud Run ───────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-frontend
    waitFor: [push-frontend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_FRONTEND_IMAGE}:${SHORT_SHA}
      - --region=${_GCP_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3

images:
  - ${_BACKEND_IMAGE}:${SHORT_SHA}
  - ${_BACKEND_IMAGE}:latest
  - ${_FRONTEND_IMAGE}:${SHORT_SHA}
  - ${_FRONTEND_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
