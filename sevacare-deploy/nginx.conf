server {
  listen 8080;
  root /usr/share/nginx/html;
  index index.html;

  # Flutter web emits no content hash in any filename — index.html,
  # flutter_bootstrap.js, main.dart.js and everything under assets/ keep stable
  # names across builds. With no Cache-Control header nginx leaves freshness to
  # the browser's heuristic (roughly 10% of the document's age), so a returning
  # visitor happily reuses last week's main.dart.js and a released change stays
  # invisible until a hard reload.
  #
  # "no-cache" does not disable caching — it stores the response and forces an
  # ETag revalidation before reuse. An unchanged 5 MB main.dart.js therefore
  # costs one 304, not a re-download, and a deployed build is picked up on the
  # next page load.
  add_header Cache-Control "no-cache" always;

  # ── Security headers ──────────────────────────────────────────────────────
  # Cloud Run terminates TLS in front of us, so HSTS is honest to promise.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(self), microphone=(), payment=()" always;
  # Flutter web's reality: the bootstrap script is inline in index.html
  # ('unsafe-inline'), CanvasKit needs wasm room ('wasm-unsafe-eval') and is
  # fetched from gstatic along with fonts. connect-src stays open because the
  # API origin differs per deployment and is already pinned by the backend's
  # CORS policy. After the next deploy, load every screen once with DevTools
  # open — a CSP mistake shows up as console violations, not a blank page.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src *; frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;

  # dart2js output is ~5 MB of highly compressible text.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json
             application/wasm image/svg+xml;
  gzip_min_length 1024;

  # Matched before the app root so the marketing site's static files fall back
  # to its own index.html, not the Flutter app shell.
  location /site/ {
    try_files $uri $uri/ /site/index.html;
  }

  # SPA fallback. GoRouter uses the hash strategy, but direct links still need
  # nginx to serve the app shell for unknown paths.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
