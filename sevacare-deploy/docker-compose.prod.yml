# Production override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# All secrets are injected from the environment (never commit real values).
# Variable names match exactly what the Spring app reads (see application.yml).
services:
  backend:
    environment:
      SEVACARE_DB_URL: ${SEVACARE_DB_URL}
      SEVACARE_DB_USERNAME: ${SEVACARE_DB_USERNAME}
      SEVACARE_DB_PASSWORD: ${SEVACARE_DB_PASSWORD}
      SEVACARE_AUTH_SECRET: ${SEVACARE_AUTH_SECRET}
      SEVACARE_CORS_ORIGINS: ${SEVACARE_CORS_ORIGINS}
      SPRING_PROFILES_ACTIVE: production
      PORT: ${PORT:-8080}
    restart: unless-stopped

  frontend:
    build:
      args:
        ENV: production
        API_BASE_URL: ${API_BASE_URL}
    restart: unless-stopped

  postgres:
    # In production prefer a managed PostgreSQL; drop this service when using one.
    restart: unless-stopped
